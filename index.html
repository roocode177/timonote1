
<!DOCTYPE html>
<html>
<head>
    <title>Timonest - Appointment Booking</title>
</head>
<body>

<h1>Timonest</h1>
<p>Book your appointment easily</p>

<h2>Book Appointment</h2>
<form>

<label>Name:</label><br>
<input type="text" id="name"><br><br>

<label>Email:</label><br>
<input type="email" id="email"><br><br>

<label>Phone:</label><br>
<input type="text" id="phone"><br><br>

<label>Service:</label><br>
<select id="service">
<option>Consultation</option>
<option>Meeting</option>
<option>Demo</option>
</select><br><br>

<label>Date:</label><br>
<input type="date" id="date"><br><br>

<label>Time:</label><br>
<input type="time" id="time"><br><br>

<label>Message:</label><br>
<textarea id="message"></textarea><br><br>

<button type="button" onclick="bookAppointment()">Book Appointment</button>
</form>
<h2>Appointments</h2>
<div id="appointments"></div><script src="script.js"></script>
</body>
</html>
